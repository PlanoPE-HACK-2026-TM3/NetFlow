[pytest]
# Run tests from the repo root so `import backend.xxx` resolves.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support (pytest-asyncio)
asyncio_mode = auto

# Output
addopts =
    -ra
    --strict-markers
    --tb=short
    --color=yes

# Filter noisy warnings from upstream libs we can't control
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:langchain.*
    ignore::PendingDeprecationWarning
